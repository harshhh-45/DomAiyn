{% extends 'base_auth.html' %}

{% block title %}Verify OTP{% endblock %}

{% block content %}
<div class="auth-header">
    <h1 class="auth-title">Verify OTP</h1>
    <p class="auth-subtitle">Check your email for the 6-digit verification code</p>
</div>

<form method="post">
    {% csrf_token %}
    <div class="form-group">
        <input type="text" name="otp" class="form-control" placeholder="000000" maxlength="6" 
            pattern="[0-9]{6}" inputmode="numeric" autocomplete="one-time-code" required autofocus
            style="text-align:center;font-size:1.8rem;letter-spacing:0.5rem;font-weight:700;font-family:var(--font-mono);">
    </div>
    <button type="submit" class="btn-auth">Verify OTP →</button>
</form>

<div class="auth-links">
    <p><a href="{% url 'forgot_password' %}">Resend Code</a></p>
</div>
{% endblock %}
