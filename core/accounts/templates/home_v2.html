{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DomAIyn Labs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'dist/assets/main.css' %}?v={% now 'U' %}">
</head>
<body class="bg-[#271E37]">
    <div id="root"></div>
    <script nonce="{{ csp_nonce }}">
        window.djangoAuth = {
            isAuthenticated: {{ user.is_authenticated|yesno:"true,false" }},
            username: "{{ user.username|default:'' }}",
            isStaff: {{ user.is_staff|yesno:"true,false" }}
        };
    </script>
    <script type="module" src="{% static 'dist/assets/main.js' %}?v={% now 'U' %}"></script>
</body>
</html>
