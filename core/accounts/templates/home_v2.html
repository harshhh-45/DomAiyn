{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DomAlyn Labs - Continuous Safety Validation for AI Systems</title>
    <meta name="description"
        content="DomAlyn Labs offers adversarial testing, behavioural risk audits, and compliance-ready safety evidence for privacy-first, deterministic large language models.">
    <meta name="keywords"
        content="AI safety, LLM security, adversarial testing, behavioural risk audits, AI compliance, deterministic AI, isolated cloud, on-prem AI deployment, DomAlyn Labs">

    <!-- Open Graph / Facebook / LinkedIn -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ site_url }}/">
    <meta property="og:title" content="DomAlyn Labs - Continuous Safety Validation for AI Systems">
    <meta property="og:description"
        content="Adversarial testing, behavioural risk audits, and compliance-ready safety evidence for large language models.">
    <meta property="og:image" content="{{ site_url }}{% static 'dist/sphere_logo.png' %}">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="{{ site_url }}/">
    <meta property="twitter:title" content="DomAlyn Labs - Continuous Safety Validation for AI Systems">
    <meta property="twitter:description"
        content="Adversarial testing, behavioural risk audits, and compliance-ready safety evidence for large language models.">
    <meta property="twitter:image" content="{{ site_url }}{% static 'dist/sphere_logo.png' %}">

    <!-- Canonical Link -->
    <link rel="canonical" href="{{ site_url }}/">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{% static 'dist/assets/main.css' %}?v={% now 'U' %}">
</head>

<body class="bg-[#271E37]">
    <div id="root"></div>
    <script nonce="{{ csp_nonce }}">
        window.djangoAuth = {
            isAuthenticated: {{ user.is_authenticated | yesno: "true,false" }},
        username: "{{ user.username|default:'' }}",
            isStaff: { { user.is_staff | yesno: "true,false" } }
        };
    </script>
    <script type="module" src="{% static 'dist/assets/main.js' %}?v={% now 'U' %}"></script>
</body>

</html>
