{% extends 'base_auth.html' %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="auth-header">
    <h1 class="auth-title">Reset Password</h1>
    <p class="auth-subtitle">Enter your email to receive a password reset OTP</p>
</div>

<form method="post">
    {% csrf_token %}
    <div class="form-group">
        <input type="email" name="email" class="form-control" placeholder="Enter your email address" required autofocus>
    </div>
    <button type="submit" class="btn-auth">Send Reset OTP →</button>
</form>

<div class="auth-links">
    <a href="{% url 'login' %}">Back to Login</a>
</div>
{% endblock %}
