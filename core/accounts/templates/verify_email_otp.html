{% extends 'base_auth.html' %}

{% block title %}Verify Email{% endblock %}

{% block content %}
<div class="auth-header">
    <div style="font-size: 3rem; margin-bottom: 1rem; opacity: 0.9;">📧</div>
    <h1 class="auth-title">Verify Your Email</h1>
    <p class="auth-subtitle">
        We've sent a 6-digit verification code to<br>
        <span style="color: var(--accent-light);">{{ email }}</span>
    </p>
</div>

<form method="post">
    {% csrf_token %}
    <div class="form-group">
        <input type="text" name="otp" class="form-control" placeholder="000000" maxlength="6"
            pattern="[0-9]{6}" inputmode="numeric" autocomplete="one-time-code" required autofocus
            style="text-align:center;font-size:1.8rem;letter-spacing:0.5rem;font-weight:700;font-family:var(--font-mono);">
    </div>
    <button type="submit" class="btn-auth">Verify & Create Account →</button>
</form>

<div class="auth-links">
    <p>Didn't receive the code? Check your spam folder or <a href="{% url 'register' %}">try again</a>.</p>
</div>
{% endblock %}
