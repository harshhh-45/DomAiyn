{% extends 'dashboard/base.html' %}
{% block title %}Add Admin | DomAIyn Panel{% endblock %}
{% block page_title %}Add Admin{% endblock %}

{% block content %}
<div class="page-header">
    <h2>Create Admin Account</h2>
    <a href="{% url 'admin_admins' %}" class="btn btn-ghost"><i class="bi bi-arrow-left"></i> Back</a>
</div>
<div class="panel-card" style="max-width:480px">
    <div class="panel-card-body">
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" class="form-control" placeholder="Enter email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" placeholder="Set password" required>
            </div>
            <div class="form-group">
                <label>Role</label>
                <select name="role" class="form-control">
                    <option value="admin">Admin — can view users, contacts, reports</option>
                    <option value="superadmin">Superadmin — full access including admin management</option>
                </select>
            </div>
            <div style="display:flex;gap:0.75rem;margin-top:1.5rem">
                <button type="submit" class="btn btn-primary"><i class="bi bi-shield-plus"></i> Create</button>
                <a href="{% url 'admin_admins' %}" class="btn btn-ghost">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
